<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0f1419; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #1f6feb; --accent-2: #7ee787;
    }
    body {
      margin: 0; width: 300px; background: var(--bg); color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 13px; padding: 14px;
    }
    h1 { font-size: 14px; margin: 0 0 4px; letter-spacing: .3px; }
    .sub { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
    button.tool {
      display: block; width: 100%; text-align: left;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
      font: inherit; transition: border-color .15s, transform .05s;
    }
    button.tool:hover { border-color: var(--accent); }
    button.tool:active { transform: scale(.98); }
    button.tool .title { font-weight: 600; color: var(--accent-2); }
    button.tool .desc { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.35; }
    .footer { font-size: 10px; color: var(--muted); margin-top: 8px; text-align: center; opacity: .7; }
    #status { font-size: 11px; color: var(--muted); min-height: 14px; margin-top: 4px; }
    #status.err { color: #ff6b6b; }
    #status.ok { color: var(--accent-2); }
  </style>
</head>
<body>
  <h1>FEU Canvas Helper</h1>
  <div class="sub">Open Canvas first, then pick a tool.</div>

  <button class="tool" data-tool="dashboard">
    <div class="title">📋 Pending Dashboard</div>
    <div class="desc">Bento grid of favorited courses + recently unlocked banner. Cached for speed.</div>
  </button>

  <button class="tool" data-tool="sweep">
    <div class="title">🪄 Auto-Sweep</div>
    <div class="desc">Scans all favorited courses, categorizes every blocker, auto-completes only must_view + must_mark_done. Lists discussions, submissions, quizzes for you.</div>
  </button>

  <button class="tool" data-tool="autonext">
    <div class="title">⏭ Autonext (auto)</div>
    <div class="desc">Auto-clicks "Next" across pages until it hits a quiz, discussion, submission, or locked module. Floating overlay shows status; click Pause/Stop to intervene.</div>
  </button>

  <div id="status"></div>
  <div class="footer">Read-only · uses your session</div>

  <script src="popup.js"></script>
</body>
</html>
